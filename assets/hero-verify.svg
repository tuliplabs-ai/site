<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" role="img"
     aria-label="Three claims are checked against evidence; a finding ships only when its evidence clears the grounding bar, otherwise the agent abstains and records why."
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#1B1620"/>
    </marker>
    <marker id="arm" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#78716C"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="1.5" y="1.5" width="517" height="437" rx="18" fill="#FFFFFF" stroke="#E7E0DB"/>

  <text x="34" y="48" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#78716C">CLAIM · EVIDENCE · VERDICT</text>

  <!-- claim chips -->
  <g>
    <rect x="34" y="66" width="206" height="46" rx="10" fill="#F4EFEC"/>
    <text x="54" y="94" font-size="14" font-weight="500" fill="#1B1620">tool match</text>
    <circle cx="214" cy="89" r="11" fill="#D6336C"/>
    <path d="M209,89 l3.5,3.5 L220,85" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="34" y="122" width="206" height="46" rx="10" fill="#F4EFEC"/>
    <text x="54" y="150" font-size="14" font-weight="500" fill="#1B1620">alert signal</text>
    <circle cx="214" cy="145" r="11" fill="#D6336C"/>
    <path d="M209,145 l3.5,3.5 L220,141" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="34" y="178" width="206" height="46" rx="10" fill="#F4EFEC"/>
    <text x="54" y="206" font-size="14" font-weight="500" fill="#4A434C">model inference</text>
    <circle cx="214" cy="201" r="11" fill="none" stroke="#78716C" stroke-width="1.6" stroke-dasharray="2.5,2.5"/>
  </g>

  <!-- converging arrows into the gate -->
  <line x1="244" y1="89"  x2="296" y2="128" stroke="#1B1620" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="244" y1="145" x2="296" y2="145" stroke="#1B1620" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="244" y1="201" x2="296" y2="162" stroke="#1B1620" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- GSAR gate -->
  <rect x="300" y="100" width="156" height="90" rx="14" fill="#1B1620"/>
  <text x="378" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#FFFFFF">GSAR</text>
  <text x="378" y="162" text-anchor="middle" font-size="11.5" fill="#FFFFFF" opacity="0.82">score ≥ threshold?</text>

  <!-- verdicts -->
  <rect x="270" y="300" width="216" height="54" rx="12" fill="#D6336C"/>
  <text x="290" y="324" font-size="15" font-weight="600" fill="#FFFFFF">Finding — ships</text>
  <text x="290" y="342" font-size="11" fill="#FFFFFF" opacity="0.85">tagged · audit-logged · gsar 0.91</text>

  <rect x="270" y="366" width="216" height="46" rx="12" fill="#F4EFEC" stroke="#78716C" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="290" y="394" font-size="14" font-weight="500" fill="#78716C">abstains — records why</text>

  <!-- gate -> verdicts -->
  <path d="M360,190 L360,300" fill="none" stroke="#1B1620" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M400,190 L400,250 Q400,366 416,366" fill="none" stroke="#78716C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arm)"/>

  <text x="34" y="420" font-size="11.5" font-style="italic" fill="#78716C">a finding ships only when its evidence clears the bar</text>
</svg>
